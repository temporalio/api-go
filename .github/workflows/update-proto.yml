name: "Update Proto"

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch in api-go repo to update protos (default: main)"
        required: false
        default: main
      commit_author:
        description: "Commit author username"
        required: true
      commit_author_email:
        description: "Commit author email"
        required: true
      commit_message:
        description: "Commit message"
        required: true

jobs:
  sync:
    name: "Update proto"
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash

    steps:
      - name: Generate token
        id: generate_token
        uses: actions/create-github-app-token@d72941d797fd3113feb6b93fd0dec494b13a2547 # v1.12.0
        with:
          app-id: ${{ secrets.TEMPORAL_CICD_APP_ID }}
          private-key: ${{ secrets.TEMPORAL_CICD_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          token: ${{ steps.generate_token.outputs.token }}
          persist-credentials: true
          ref: ${{ github.event.inputs.branch }}
          submodules: true

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: 'go.mod'
          check-latest: true

      - uses: arduino/setup-protoc@149f6c87b92550901b26acd1632e11c3662e381f # v1.3.0
        with:
          version: "3.x"

      # Needed for pnpm
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '22'

      # For nexus-rpc-gen-install
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          version: latest

      # Add pnpm directory to PATH for runner
      - run: echo "$PNPM_HOME/bin" >> $GITHUB_PATH

      - name: Re-build proto
        run: |
          make install update-proto test

      - name: Commit update
        env:
          GIT_AUTHOR_NAME: ${{ github.event.inputs.commit_author }}
          GIT_AUTHOR_EMAIL: ${{ github.event.inputs.commit_author_email }}
          GIT_COMMITTER_NAME: ${{ github.event.inputs.commit_author }}
          GIT_COMMITTER_EMAIL: ${{ github.event.inputs.commit_author_email }}
          GIT_COMMIT_MESSAGE: ${{ github.event.inputs.commit_message }}
        run: |
          git add .
          git commit -m "${GIT_COMMIT_MESSAGE}"
          if [ $? -eq 0 ]; then
            git push
          else
            echo "No changes to commit"
          fi
