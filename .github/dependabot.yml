version: 2
updates:
  - package-ecosystem: gomod
    directory: "/"
    schedule:
      interval: weekly
    cooldown:
      default-days: 14

  - package-ecosystem: gomod
    directory: "/build"
    schedule:
      interval: weekly
    cooldown:
      default-days: 14

  - package-ecosystem: gomod
    directory: "/cmd/proxygenerator"
    schedule:
      interval: weekly
    cooldown:
      default-days: 14

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    cooldown:
      default-days: 14
